name: Generate Metrics
on:
  schedule:
    - cron: "0 */12 * * *" # Atualiza automaticamente a cada 12 horas
  workflow_dispatch: # Permite que você rode manualmente quando quiser
  push:
    branches: ["main", "master"]

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Configuração dos Status Gerais (Commits, Stars, etc)
      - name: General Metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github-metrics.svg
          base: header, activity, community, repositories
          base_private: yes # Inclui repositórios privados

      # Configuração das Linguagens mais usadas
      - name: Language Metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github-languages.svg
          base: ""
          plugin_languages: yes
          plugin_languages_ignored: jupyter notebook, tex, css, php # Ignora estas linguagens
          plugin_languages_skipped: Pacman-AI # Ignora este repositório
          plugin_languages_limit: 6
